services:
  api:
    build:
      context: ./api
    container_name: advanced_agent_api
    ports:
      - "8003:8000"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    restart: unless-stopped

  ui:
    build:
      context: ./ui
    container_name: advanced_agent_ui
    ports:
      - "8503:8501"
    depends_on:
      - api
    restart: unless-stopped
