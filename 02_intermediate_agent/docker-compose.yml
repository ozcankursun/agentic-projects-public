services:
  api:
    build:
      context: ./api
    container_name: intermediate_agent_api
    ports:
      - "8000:8000"
    env_file:
      - .env
    restart: unless-stopped

  ui:
    build:
      context: ./ui
    container_name: intermediate_agent_ui
    ports:
      - "8501:8501"
    depends_on:
      - api
    restart: unless-stopped
